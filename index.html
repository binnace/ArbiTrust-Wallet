<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbiTrust | Wallet & Swap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .arb-card { background: linear-gradient(180deg, #111827 0%, #030712 100%); border: 1px solid #1f2937; border-radius: 28px; }
        .swap-input { background-color: #1f2937; border: 1px solid #374151; border-radius: 16px; padding: 16px; }
        .btn-action { background: linear-gradient(90deg, #2563eb, #3b82f6); transition: 0.3s; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500 w-10 h-10 rounded-full flex items-center justify-center font-extrabold text-black shadow-lg">B</div>
            <h1 class="text-xl font-extrabold tracking-tighter cursor-pointer" onclick="showPage('wallet')">ArbiTrust</h1>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="btn-action px-4 py-2 rounded-full text-xs font-bold text-white uppercase">Connect Wallet</button>
    </div>

    <div id="walletPage" class="w-full max-w-md">
        <div class="arb-card p-8 shadow-2xl mb-6">
            <p class="text-gray-500 text-[10px] font-bold uppercase text-center mb-2 tracking-widest">Total Portfolio Value</p>
            <h2 id="busdBalanceHeader" class="text-5xl font-extrabold text-center mb-10 tracking-tight">$0.00</h2>

            <div class="grid grid-cols-3 gap-4 mb-10 text-center">
                <div class="cursor-pointer opacity-50"><div class="text-2xl mb-1">📤</div><span class="text-[10px] font-bold">SEND</span></div>
                <div class="cursor-pointer opacity-50"><div class="text-2xl mb-1">📥</div><span class="text-[10px] font-bold">RECEIVE</span></div>
                <div class="cursor-pointer" onclick="showPage('swap')"><div class="text-2xl mb-1 text-blue-500">🔄</div><span class="text-[10px] font-bold text-blue-500">SWAP</span></div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Assets</h3>
                <div class="bg-gray-900/50 p-5 rounded-2xl flex justify-between items-center border border-gray-800">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center font-bold text-black text-xs">BUSD</div>
                        <div><p class="font-bold text-sm">Bharat BUSD</p><p class="text-[10px] text-gray-500 font-semibold">Arbitrum</p></div>
                    </div>
                    <p id="busdBalanceList" class="font-bold text-lg">0.00</p>
                </div>
            </div>
        </div>
    </div>

    <div id="swapPage" class="w-full max-w-md hidden">
        <div class="arb-card p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold">Swap Tokens</h2>
                <div class="text-gray-400 cursor-pointer text-xl" onclick="showPage('wallet')">✕</div>
            </div>

            <div class="swap-input mb-2">
                <div class="flex justify-between text-xs text-gray-400 mb-2 font-bold"><span>From</span><span>Balance: <span id="swapBalance">0.00</span></span></div>
                <div class="flex justify-between">
                    <input type="number" id="fromAmount" placeholder="0.0" class="bg-transparent text-2xl font-bold outline-none w-1/2">
                    <div class="flex items-center gap-2 bg-gray-800 px-3 py-1 rounded-full font-bold text-sm">
                        <div class="bg-yellow-500 w-5 h-5 rounded-full"></div> BUSD
                    </div>
                </div>
            </div>

            <div class="flex justify-center -my-3 z-10 relative"><div class="bg-gray-900 border border-gray-700 w-8 h-8 rounded-lg flex items-center justify-center">↓</div></div>

            <div class="swap-input mb-6">
                <div class="flex justify-between text-xs text-gray-400 mb-2 font-bold"><span>To</span><span>Estimated</span></div>
                <div class="flex justify-between">
                    <input type="number" readonly placeholder="0.0" class="bg-transparent text-2xl font-bold outline-none w-1/2 text-gray-500">
                    <div class="flex items-center gap-2 bg-blue-600 px-3 py-1 rounded-full font-bold text-sm">
                        <div class="bg-white w-5 h-5 rounded-full text-[10px] text-blue-600 flex items-center justify-center font-black">E</div> ETH
                    </div>
                </div>
            </div>

            <button onclick="alert('Routing to Liquidity Pool...')" class="btn-action w-full py-4 rounded-2xl font-extrabold text-sm uppercase tracking-widest shadow-xl">Confirm Swap</button>
        </div>
    </div>

    <script>
        const BUSD_ADDRESS = "0x25d34817D4205fE605b4C65Ed3Be83C85107d333";
        const ABI = ["function balanceOf(address owner) view returns (uint256)"];
        let provider, account;

        function showPage(page) {
            document.getElementById('walletPage').classList.toggle('hidden', page !== 'wallet');
            document.getElementById('swapPage').classList.toggle('hidden', page !== 'swap');
        }

        async function connectWallet() {
            if (window.ethereum) {
                provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                account = accounts[0];
                document.getElementById('connectBtn').innerText = account.substring(0,6) + "..." + account.substring(38);
                updateBalances();
            } else { alert("Use Trust Wallet/MetaMask Browser!"); }
        }

        async function updateBalances() {
            const busdContract = new ethers.Contract(BUSD_ADDRESS, ABI, provider);
            const balance = await busdContract.balanceOf(account);
            const formatted = ethers.formatUnits(balance, 18);
            const display = parseFloat(formatted).toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('busdBalanceHeader').innerText = "$" + display;
            document.getElementById('busdBalanceList').innerText = display;
            document.getElementById('swapBalance').innerText = display;
        }
    </script>
</body>
</html>
