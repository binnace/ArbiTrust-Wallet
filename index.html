<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbiTrust Wallet & Swap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .arb-card { background: linear-gradient(180deg, #111827 0%, #030712 100%); border: 1px solid #1f2937; border-radius: 24px; }
        .arb-blue { color: #28a0f0; }
        .arb-bg-blue { background-color: #28a0f0; }
        .token-card { background-color: #111827; border: 1px solid #374151; transition: 0.2s; }
        .token-card:hover { border-color: #28a0f0; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4 sm:p-8">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <div class="arb-bg-blue w-10 h-10 rounded-full flex items-center justify-center font-extrabold text-white">AT</div>
            <h1 class="text-xl font-extrabold tracking-tight">Arbi<span class="arb-blue">Trust</span></h1>
        </div>
        <button class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-full text-sm font-semibold transition">Connect Wallet</button>
    </div>

    <div class="w-full max-w-md arb-card p-6 shadow-2xl mb-6">
        <p class="text-gray-400 text-xs font-semibold uppercase tracking-widest mb-1 text-center">ArbiTrust Net Worth</p>
        <h2 class="text-5xl font-extrabold text-center mb-2">$0.00</h2>
        <div class="flex justify-center items-center gap-2 mb-8">
            <span class="bg-green-500/10 text-green-500 text-xs px-2 py-1 rounded-md font-bold">+0.0%</span>
        </div>

        <div class="flex justify-around mb-8">
            <div class="flex flex-col items-center gap-2 cursor-pointer group">
                <div class="w-14 h-14 bg-gray-800 group-hover:arb-bg-blue rounded-2xl flex items-center justify-center text-2xl transition">📤</div>
                <span class="text-xs font-semibold">Send</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer group">
                <div class="w-14 h-14 bg-gray-800 group-hover:arb-bg-blue rounded-2xl flex items-center justify-center text-2xl transition">📥</div>
                <span class="text-xs font-semibold">Receive</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer group">
                <div class="w-14 h-14 bg-gray-800 group-hover:arb-bg-blue rounded-2xl flex items-center justify-center text-2xl transition">🔄</div>
                <span class="text-xs font-semibold">Swap</span>
            </div>
        </div>

        <div class="space-y-3">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Assets</h3>
            
            <div class="token-card p-4 rounded-2xl flex justify-between items-center cursor-pointer">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center font-bold text-black text-xs">BUSD</div>
                    <div>
                        <p class="font-bold">BUSD (Arbitrum)</p>
                        <p class="text-xs text-gray-400">$1.00</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold text-gray-400">0.00</p>
                </div>
            </div>

            <div class="token-card p-4 rounded-2xl flex justify-between items-center cursor-pointer">
                <div class="flex items-center gap-3">
                    <div class="arb-bg-blue w-10 h-10 rounded-full flex items-center justify-center font-bold text-white text-xs">ATB</div>
                    <div>
                        <p class="font-bold">ArbiTrust Token</p>
                        <p class="text-xs text-gray-400">$0.00</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold text-gray-400">0.00</p>
                </div>
            </div>
        </div>
    </div>

    <p class="text-gray-600 text-xs text-center">Powered by Arbitrum Network | © 2024 ArbiTrust</p>

</body>
</html>
