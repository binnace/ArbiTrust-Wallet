<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbiTrust | BUSD Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .arb-card { background: linear-gradient(180deg, #111827 0%, #030712 100%); border: 1px solid #1f2937; border-radius: 24px; }
        .arb-blue { color: #28a0f0; }
        .arb-bg-blue { background-color: #28a0f0; }
        .token-card { background-color: #111827; border: 1px solid #374151; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <div class="bg-yellow-500 w-10 h-10 rounded-full flex items-center justify-center font-extrabold text-black">B</div>
            <h1 class="text-xl font-extrabold tracking-tight">Arbi<span class="arb-blue">Trust</span></h1>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full text-xs font-semibold transition shadow-lg shadow-blue-900/20">Connect Wallet</button>
    </div>

    <div class="w-full max-w-md arb-card p-6 shadow-2xl mb-6">
        <p class="text-gray-400 text-xs font-semibold uppercase text-center mb-1">Your BUSD Balance</p>
        <h2 id="busdBalanceHeader" class="text-5xl font-extrabold text-center mb-8 tracking-tight">$0.00</h2>

        <div class="flex justify-around mb-10">
            <div class="flex flex-col items-center gap-2 cursor-pointer group" onclick="alert('Sending Feature Coming Soon!')">
                <div class="w-14 h-14 bg-gray-800 group-hover:bg-blue-600 rounded-2xl flex items-center justify-center text-2xl transition-all">📤</div>
                <span class="text-xs font-semibold text-gray-400">Send</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer group" onclick="alert('Receive Feature Coming Soon!')">
                <div class="w-14 h-14 bg-gray-800 group-hover:bg-blue-600 rounded-2xl flex items-center justify-center text-2xl transition-all">📥</div>
                <span class="text-xs font-semibold text-gray-400">Receive</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer group" onclick="alert('DEX Swap Launching Next!')">
                <div class="w-14 h-14 bg-gray-800 group-hover:bg-blue-600 rounded-2xl flex items-center justify-center text-2xl transition-all">🔄</div>
                <span class="text-xs font-semibold text-gray-400">Swap</span>
            </div>
        </div>

        <div class="space-y-3">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Native Assets</h3>
            <div class="token-card p-4 rounded-2xl flex justify-between items-center border-yellow-500/20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center font-bold text-black text-xs">BUSD</div>
                    <div><p class="font-bold">Bharat BUSD</p><p class="text-xs text-gray-500">Arbitrum One</p></div>
                </div>
                <div class="text-right">
                    <p id="busdBalanceList" class="font-bold text-yellow-500 text-xl tracking-tight">0.00</p>
                </div>
            </div>
        </div>
    </div>

    <p class="text-gray-600 text-xs text-center mt-4">ArbiTrust Ecosystem | Built for Bharat</p>

    <script>
        const BUSD_ADDRESS = "0x25d34817D4205fE605b4C65Ed3Be83C85107d333";
        const ABI = ["function balanceOf(address owner) view returns (uint256)"];

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    const account = accounts[0];
                    
                    document.getElementById('connectBtn').innerText = account.substring(0,6) + "..." + account.substring(38);
                    document.getElementById('connectBtn').classList.replace('bg-blue-600', 'bg-green-600');

                    // Fetch Balance
                    const busdContract = new ethers.Contract(BUSD_ADDRESS, ABI, provider);
                    const balance = await busdContract.balanceOf(account);
                    
                    // Format and Display (Assuming 18 decimals)
                    const formattedBalance = ethers.formatUnits(balance, 18);
                    document.getElementById('busdBalanceHeader').innerText = "$" + parseFloat(formattedBalance).toFixed(2);
                    document.getElementById('busdBalanceList').innerText = parseFloat(formattedBalance).toFixed(2);

                } catch (err) {
                    console.error("Connection Error:", err);
                }
            } else {
                alert("Opps! Please open this link inside Trust Wallet or MetaMask Browser.");
            }
        }
    </script>
</body>
</html>
