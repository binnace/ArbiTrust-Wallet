<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbiTrust Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .arb-card { background: linear-gradient(180deg, #111827 0%, #030712 100%); border: 1px solid #1f2937; border-radius: 24px; }
        .arb-blue { color: #28a0f0; }
        .arb-bg-blue { background-color: #28a0f0; }
        .token-card { background-color: #111827; border: 1px solid #374151; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4 sm:p-8">

    <div class="w-full max-w-md flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <div class="arb-bg-blue w-10 h-10 rounded-full flex items-center justify-center font-extrabold text-white">AT</div>
            <h1 class="text-xl font-extrabold">Arbi<span class="arb-blue">Trust</span></h1>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full text-sm font-semibold transition">Connect Wallet</button>
    </div>

    <div class="w-full max-w-md arb-card p-6 shadow-2xl mb-6">
        <p class="text-gray-400 text-xs font-semibold uppercase text-center mb-1">Total Balance</p>
        <h2 id="totalBalance" class="text-5xl font-extrabold text-center mb-8">$0.00</h2>

        <div class="flex justify-around mb-8">
            <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="alert('Sending coming soon!')">
                <div class="w-14 h-14 bg-gray-800 rounded-2xl flex items-center justify-center text-2xl">📤</div>
                <span class="text-xs font-semibold text-gray-400">Send</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="alert('Receive address: 0x...')">
                <div class="w-14 h-14 bg-gray-800 rounded-2xl flex items-center justify-center text-2xl">📥</div>
                <span class="text-xs font-semibold text-gray-400">Receive</span>
            </div>
            <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="alert('DEX launching next!')">
                <div class="w-14 h-14 bg-gray-800 rounded-2xl flex items-center justify-center text-2xl">🔄</div>
                <span class="text-xs font-semibold text-gray-400">Swap</span>
            </div>
        </div>

        <div class="space-y-3">
            <div class="token-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center font-bold text-black text-xs">BUSD</div>
                    <div><p class="font-bold">BUSD</p><p class="text-xs text-gray-500">Arbitrum</p></div>
                </div>
                <div class="text-right"><p id="busdBalance" class="font-bold">0.00</p></div>
            </div>

            <div class="token-card p-4 rounded-2xl flex justify-between items-center border-blue-900/50">
                <div class="flex items-center gap-3">
                    <div class="arb-bg-blue w-10 h-10 rounded-full flex items-center justify-center font-bold text-white text-xs">ATB</div>
                    <div><p class="font-bold text-blue-400">ArbiTrust</p><p class="text-xs text-gray-500">Native</p></div>
                </div>
                <div class="text-right"><p id="atbBalance" class="font-bold">0.00</p></div>
            </div>
        </div>
    </div>

    <script>
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    document.getElementById('connectBtn').innerText = account.substring(0,6) + "..." + account.substring(38);
                    document.getElementById('connectBtn').classList.replace('bg-blue-600', 'bg-green-600');
                    alert("Wallet Connected: " + account);
                } catch (err) {
                    console.error(err);
                }
            } else {
                alert("Please install MetaMask or Trust Wallet!");
            }
        }
    </script>
</body>
</html>
