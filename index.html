<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArbiTrust | Multi-Chain Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .arb-card { background: linear-gradient(180deg, #111827 0%, #030712 100%); border: 1px solid #1f2937; border-radius: 28px; }
        .arb-blue { color: #28a0f0; }
        .arb-bg-blue { background-color: #28a0f0; }
        .token-card { background-color: #111827; border: 1px solid #374151; transition: all 0.3s ease; }
        .token-card:hover { border-color: #28a0f0; transform: translateY(-2px); }
        .btn-connect { background: linear-gradient(90deg, #2563eb, #3b82f6); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4 sm:p-6">

    <div class="w-full max-w-md flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500 w-10 h-10 rounded-full flex items-center justify-center font-extrabold text-black shadow-lg">B</div>
            <h1 class="text-xl font-extrabold tracking-tighter">Arbi<span class="arb-blue">Trust</span></h1>
        </div>
        <button id="connectBtn" onclick="connectWallet()" class="btn-connect px-5 py-2.5 rounded-full text-xs font-bold text-white transition-all uppercase tracking-wider">Connect Wallet</button>
    </div>

    <div class="w-full max-w-md arb-card p-8 shadow-2xl mb-8">
        <p class="text-gray-500 text-[10px] font-bold uppercase text-center mb-2 tracking-[0.2em]">Total Portfolio Value</p>
        <h2 id="busdBalanceHeader" class="text-5xl font-extrabold text-center mb-10 tracking-tight text-white">$0.00</h2>

        <div class="grid grid-cols-3 gap-6 mb-12">
            <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="alert('Feature coming soon')">
                <div class="w-14 h-14 bg-gray-800/50 group-hover:bg-blue-600 rounded-2xl flex items-center justify-center text-xl transition-all border border-gray-700">📤</div>
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Send</span>
            </div>
            <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="alert('Feature coming soon')">
                <div class="w-14 h-14 bg-gray-800/50 group-hover:bg-blue-600 rounded-2xl flex items-center justify-center text-xl transition-all border border-gray-700">📥</div>
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Receive</span>
            </div>
            <div class="flex flex-col items-center gap-3 cursor-pointer group" onclick="alert('Swap launching soon')">
                <div class="w-14 h-14 bg-gray-800/50 group-hover:bg-blue-600 rounded-2xl flex items-center justify-center text-xl transition-all border border-gray-700">🔄</div>
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Swap</span>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Your Assets</h3>
                <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest cursor-pointer">View All</span>
            </div>
            
            <div class="token-card p-5 rounded-3xl flex justify-between items-center border-yellow-500/10">
                <div class="flex items-center gap-4">
                    <div class="w-11 h-11 bg-yellow-500 rounded-full flex items-center justify-center font-black text-black text-[10px] shadow-lg">BUSD</div>
                    <div>
                        <p class="font-bold text-white text-sm">Bharat BUSD</p>
                        <p class="text-[10px] text-gray-500 font-semibold">Arbitrum Network</p>
                    </div>
                </div>
                <div class="text-right">
                    <p id="busdBalanceList" class="font-bold text-white text-lg leading-none">0.00</p>
                    <p class="text-[10px] text-green-500 font-bold mt-1">Stable</p>
                </div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md flex flex-col items-center gap-4 text-center">
        <p class="text-gray-600 text-[10px] font-semibold uppercase tracking-widest">Powered by Arbitrum One Layer 2</p>
        <div class="flex gap-4 opacity-30">
            <span class="text-xs">Secure</span>
            <span class="text-xs">•</span>
            <span class="text-xs">Decentralized</span>
            <span class="text-xs">•</span>
            <span class="text-xs">Fast</span>
        </div>
    </div>

    <script>
        const BUSD_ADDRESS = "0x25d34817D4205fE605b4C65Ed3Be83C85107d333";
        const ABI = ["function balanceOf(address owner) view returns (uint256)"];

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    const account = accounts[0];
                    
                    document.getElementById('connectBtn').innerText = account.substring(0,6) + "..." + account.substring(38);
                    document.getElementById('connectBtn').classList.replace('btn-connect', 'bg-green-600');

                    // Check if on Arbitrum
                    const network = await provider.getNetwork();
                    if (network.chainId !== 42161n) {
                        alert("Please switch your wallet to Arbitrum One Network!");
                        return;
                    }

                    const busdContract = new ethers.Contract(BUSD_ADDRESS, ABI, provider);
                    const balance = await busdContract.balanceOf(account);
                    
                    // Display Balance (Assuming 18 decimals)
                    const formattedBalance = ethers.formatUnits(balance, 18);
                    document.getElementById('busdBalanceHeader').innerText = "$" + parseFloat(formattedBalance).toLocaleString(undefined, {minimumFractionDigits: 2});
                    document.getElementById('busdBalanceList').innerText = parseFloat(formattedBalance).toLocaleString(undefined, {minimumFractionDigits: 2});

                } catch (err) {
                    console.error("Connection failed:", err);
                }
            } else {
                alert("Please use Trust Wallet or MetaMask browser!");
            }
        }
    </script>
</body>
</html>
